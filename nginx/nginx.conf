# ============================================================================
# IoTDB Enhanced - Nginx Reverse Proxy Configuration
# ============================================================================
# Install: sudo cp /root/nginx/nginx.conf /etc/nginx/sites-available/iotdb-enhanced
# Enable:  sudo ln -sf /etc/nginx/sites-available/iotdb-enhanced /etc/nginx/sites-enabled/
# Test:    sudo nginx -t
# Reload:  sudo systemctl reload nginx
#
# For Alibaba Cloud (mainland China) without Docker:
#   - Backend (Express):  127.0.0.1:8000
#   - Frontend (Next.js): 127.0.0.1:3000
# ============================================================================

# ---------------------------------------------------------------------------
# Upstream Definitions
# ---------------------------------------------------------------------------
upstream backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

upstream frontend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ---------------------------------------------------------------------------
# Rate Limiting Zones
# ---------------------------------------------------------------------------
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# ---------------------------------------------------------------------------
# Gzip Compression
# ---------------------------------------------------------------------------
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/rss+xml
    application/atom+xml
    image/svg+xml
    font/opentype
    font/ttf
    font/woff
    font/woff2;

# ---------------------------------------------------------------------------
# Main Server Block (Port 80)
# ---------------------------------------------------------------------------
server {
    listen 80;
    server_name _;

    # Allow Let's Encrypt ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # -----------------------------------------------------------------------
    # Security Headers
    # -----------------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -----------------------------------------------------------------------
    # General Proxy Settings
    # -----------------------------------------------------------------------
    client_max_body_size 10m;
    client_body_buffer_size 128k;

    # -----------------------------------------------------------------------
    # Backend API Routes
    # -----------------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        # Connection headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Upstream keepalive
        proxy_set_header Connection "";

        # Disable buffering for SSE / streaming responses
        proxy_buffering off;
        proxy_cache_bypass $http_upgrade;
    }

    # -----------------------------------------------------------------------
    # Auth Endpoints - Stricter Rate Limiting
    # -----------------------------------------------------------------------
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;

        proxy_pass http://backend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        proxy_buffering off;
    }

    # -----------------------------------------------------------------------
    # Health Check Endpoint (no rate limiting, no logging)
    # -----------------------------------------------------------------------
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # -----------------------------------------------------------------------
    # WebSocket Support (Socket.IO)
    # -----------------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;

        # WebSocket upgrade
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long-lived connections
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 86400s;

        proxy_buffering off;
    }

    # -----------------------------------------------------------------------
    # Frontend Routes (Next.js)
    # -----------------------------------------------------------------------
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Next.js HMR WebSocket support (dev only, harmless in prod)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # -----------------------------------------------------------------------
    # Static Asset Caching
    # -----------------------------------------------------------------------
    # Next.js static assets (_next/static/) - long cache with immutable
    location /_next/static/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # JavaScript and CSS files - 1 year with immutable
    location ~* \.(js|css)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Image files - 30 days
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|avif)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Font files - 1 year with immutable
    location ~* \.(woff|woff2|ttf|eot|otf)$ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";

        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # -----------------------------------------------------------------------
    # Access Logging
    # -----------------------------------------------------------------------
    access_log /var/log/nginx/iotdb-enhanced-access.log;
    error_log /var/log/nginx/iotdb-enhanced-error.log;

    # -----------------------------------------------------------------------
    # Deny Access to Hidden Files
    # -----------------------------------------------------------------------
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
