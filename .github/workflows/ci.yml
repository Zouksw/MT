# TradeMind AI - CI/CD Pipeline
#
# Features:
# - Automated testing on every push/PR
# - Security vulnerability scanning
# - Code quality checks (ESLint, TypeScript)
# - Build artifact generation
# - PM2-based deployment on main branch
# - Rollback on failure

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  # ============================================================================
  # Security & Quality Checks
  # ============================================================================
  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd backend && pnpm install
          cd ../frontend && pnpm install

      - name: Run npm audit (backend)
        run: cd backend && pnpm audit --audit-level=moderate

      - name: Run npm audit (frontend)
        run: cd frontend && pnpm audit --audit-level=moderate

      - name: Run security audit with Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high
          command: monitor

  lint-and-typecheck:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd backend && pnpm install
          cd ../frontend && pnpm install

      - name: Type check backend
        run: cd backend && pnpm run type-check
        continue-on-error: false

      - name: Lint backend
        run: cd backend && pnpm run lint
        continue-on-error: false

      - name: Type check frontend
        run: cd frontend && pnpm run type-check
        continue-on-error: false

      - name: Lint frontend
        run: cd frontend && pnpm run lint
        continue-on-error: false

  # ============================================================================
  # Testing
  # ============================================================================
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install PostgreSQL and Redis
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql redis-server
          sudo systemctl start postgresql
          sudo systemctl start redis-server
          sudo -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';" || true
          sudo -u postgres createdb iotdb_enhanced_test || true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd backend && pnpm install

      - name: Run tests
        run: cd backend && pnpm test
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/iotdb_enhanced_test?schema=public
          REDIS_URL: redis://localhost:6379

      - name: Generate coverage report
        run: cd backend && pnpm run test:coverage
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: |
          cd frontend && pnpm install

      - name: Run tests
        run: cd frontend && pnpm test
        continue-on-error: true

      - name: Build frontend
        run: cd frontend && pnpm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/.next
          retention-days: 7

  # ============================================================================
  # Build Artifacts
  # ============================================================================
  build:
    name: Build Artifacts
    runs-on: ubuntu-latest
    needs: [security-scan, lint-and-typecheck, test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install and build backend
        run: |
          cd backend
          pnpm install
          pnpm run build

      - name: Install and build frontend
        run: |
          cd frontend
          pnpm install
          pnpm run build

      - name: Upload backend build
        uses: actions/upload-artifact@v3
        with:
          name: backend-build
          path: backend/dist/
          retention-days: 7

      - name: Upload frontend build
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 7

  # ============================================================================
  # Deploy to Production (PM2-based)
  # ============================================================================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 30
    environment:
      name: production
      url: https://trademind.example.com

    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            # Navigate to project directory
            cd ${{ secrets.PROJECT_PATH || '/root' }}

            # Pull latest changes
            git pull origin main

            # Install dependencies
            cd backend && pnpm install --frozen-lockfile
            cd ../frontend && pnpm install --frozen-lockfile

            # Build backend
            cd ../backend && pnpm run build

            # Build frontend
            cd ../frontend && pnpm run build

            # Run database migrations
            cd ../backend
            npx prisma migrate deploy

            # Restart services with PM2 (zero-downtime reload)
            cd ${{ secrets.PROJECT_PATH || '/root' }}
            pm2 reload ecosystem.config.cjs --env production
            pm2 save

            # Run health checks
            ./scripts/health-check.sh

            echo "Deployment completed successfully!"

      - name: Verify deployment
        run: |
          sleep 30
          curl -f ${{ secrets.APP_URL }}/api/health || exit 1
          echo "Deployment verification successful!"

      - name: Notify deployment success
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            Deployment to production successful!
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

      - name: Notify deployment failure
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          text: |
            Deployment to production FAILED!
            Commit: ${{ github.sha }}
            Author: ${{ github.actor }}
            Please investigate immediately.
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true

  # ============================================================================
  # Rollback on Failure
  # ============================================================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: failure()
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rollback deployment
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd ${{ secrets.PROJECT_PATH || '/root' }}

            # Revert to previous commit
            git revert HEAD --no-edit

            # Rebuild and restart
            cd backend && pnpm install && pnpm run build
            cd ../frontend && pnpm install && pnpm run build

            # Restart with PM2
            cd ${{ secrets.PROJECT_PATH || '/root' }}
            pm2 reload ecosystem.config.cjs --env production
            pm2 save

            echo "Rollback completed!"

      - name: Notify rollback
        uses: 8398a7/action-slack@v3
        with:
          status: warning
          text: |
            Deployment was rolled back due to failure!
            Previous version restored.
            Please investigate the issue.
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
