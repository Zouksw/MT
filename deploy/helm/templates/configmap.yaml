apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "iotdb-enhanced.fullname" . }}-config
  labels:
    app.kubernetes.io/component: config
data:
  NODE_ENV: "{{ .Values.backend.env.NODE_ENV }}"
  PORT: "{{ .Values.backend.port }}"
  AI_NODE_HOST: "{{ .Values.backend.env.AI_NODE_HOST }}"
  AI_NODE_PORT: "{{ .Values.backend.env.AI_NODE_PORT }}"
  NEXT_PUBLIC_API_URL: "{{ .Values.frontend.env.NEXT_PUBLIC_API_URL }}"
