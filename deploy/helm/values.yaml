# Default values for trademind

replicaCount: 2

image:
  backend:
    repository: trademind/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: trademind/frontend
    tag: latest
    pullPolicy: IfNotPresent

# Backend configuration
backend:
  port: 3001
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi
  env:
    NODE_ENV: production
    PORT: "3001"
    AI_NODE_PORT: "10810"
  envSecrets:
    - DATABASE_URL
    - REDIS_HOST
    - REDIS_PORT
    - JWT_SECRET
    - SESSION_SECRET

# Frontend configuration
frontend:
  port: 3000
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    NEXT_PUBLIC_API_URL: "http://backend:3001"

# PostgreSQL
postgresql:
  enabled: true
  auth:
    username: mt_user
    database: mt_db
  primary:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 500m
        memory: 1Gi

# Redis
redis:
  enabled: true
  auth:
    enabled: false
  master:
    persistence:
      size: 5Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi

# Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: trademind.example.com
      paths:
        - path: /api
          service: backend
        - path: /
          service: frontend
  tls:
    - secretName: trademind-tls
      hosts:
        - trademind.example.com

# HPA
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Backup CronJob
backup:
  enabled: true
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  postgresWal:
    enabled: true
    s3Bucket: ""
  redisRdb:
    enabled: true
    s3Bucket: ""

# Network Policy
networkPolicy:
  enabled: false  # Enable in production for pod isolation
