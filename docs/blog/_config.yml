# TradeMind AI Blog

title: TradeMind AI Blog
description: AI-powered commodity market intelligence and prediction platform
author: TradeMind AI Team
lang: en
timezone: UTC
url: "https://trademind.ai"
baseurl: ""

# Build settings
markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - LICENSE
  - README.md

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:year/:month/:day/:title/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "TradeMind AI Team"

# Social
github_username: Zouksw
twitter_username: trademind_ai

# SEO
logo: /assets/img/logo.png
google_site_verification: your-verification-code

# Navigation
nav:
  - title: Home
    url: /
  - title: Blog
    url: /blog/
  - title: Documentation
    url: /docs
  - title: GitHub
    url: https://github.com/Zouksw/trademind
