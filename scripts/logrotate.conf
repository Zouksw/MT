# ============================================================================
# TradeMind AI - Logrotate Configuration for PM2 Logs
# ============================================================================
# Install:
#   sudo cp /root/scripts/logrotate.conf /etc/logrotate.d/trademind
#
# Test (dry run):
#   sudo logrotate -d /etc/logrotate.d/trademind
#
# Force rotation:
#   sudo logrotate -vf /etc/logrotate.d/trademind
# ============================================================================

/root/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    create 0644 root root
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        /usr/local/bin/pm2 reloadLogs >/dev/null 2>&1 || true
    endscript
}
